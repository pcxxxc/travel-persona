# ============================================================
# 旅格 Travel Persona · Nginx 配置
# ============================================================
# 部署路径: /etc/nginx/sites-available/travel-persona
# 启用命令: ln -s /etc/nginx/sites-available/travel-persona /etc/nginx/sites-enabled/
# 重载命令: nginx -t && systemctl reload nginx
# ============================================================

upstream node_backend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

server {
    listen 80;
    server_name _;  # 替换为你的域名，或保留 _ 匹配所有

    # 日志
    access_log /var/log/nginx/travel-persona.access.log;
    error_log /var/log/nginx/travel-persona.error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # 静态资源直接由 Nginx 提供（性能更好）
    # ============================================================

    # 主应用静态资源（/app 路径）
    location /app/ {
        alias /opt/travel-persona/public-app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 产品介绍页（可选）
    location /legacy/ {
        alias /opt/travel-persona/public-site/;
        index index.html;
        try_files $uri $uri/ /legacy/index.html;
    }

    # ============================================================
    # API 与动态请求转发到 Node.js
    # ============================================================

    location /api/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（AI 接口可能较慢）
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # 缓冲区（AI 返回 JSON 较大）
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
        proxy_busy_buffers_size 64k;

        # 错误降级
        proxy_intercept_errors on;
        error_page 502 = @api_fallback;
    }

    location @api_fallback {
        default_type application/json;
        return 503 '{"code":"TP-503","type":"UPSTREAM_UNAVAILABLE","message":"服务暂时不可达","userMessage":"服务正在恢复中，请稍后重试","userVisible":true,"recoverable":true}';
    }

    # 健康检查
    location /health {
        proxy_pass http://node_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================================
    # 根路径重定向到应用
    # ============================================================

    location = / {
        return 302 /app/;
    }

    location = /travel-persona {
        return 302 /app/;
    }

    location = /travel-persona/ {
        return 302 /app/;
    }
}
