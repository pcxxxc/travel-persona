# Prometheus 配置模板
# 旅格 Travel Persona 监控配置
#
# 使用方式：
#   1. 安装 Prometheus: https://prometheus.io/download/
#   2. 将此文件复制到 Prometheus 配置目录
#   3. 修改 scrape_configs 中的 targets 为实际服务地址
#   4. 启动: prometheus --config.file=prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'travel-persona'

scrape_configs:
  - job_name: 'travel-persona'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'localhost:3000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'travel-persona-primary'

  # 如果使用多实例，取消注释下方配置
  # - job_name: 'travel-persona-cluster'
  #   scrape_interval: 10s
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets:
  #         - 'localhost:3000'
  #         - 'localhost:3001'
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance

# ========== 告警规则文件引用 ==========
rule_files:
  - 'alert_rules.yml'
